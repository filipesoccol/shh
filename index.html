<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline';">
    <title>Shh - Secure Secret Sharing</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPgogIDx0ZXh0IHk9IjMyIiBmb250LXNpemU9IjMyIj7wn5SSPC90ZXh0Pgo8L3N2Zz4=" type="image/svg+xml">
    <script type="module" src="main.js"></script>
</head>
<body>
    <div class="container">
        <h1>Shh!</h1>
        <div class="cards-holder">
            <!-- Public Key Section (shown after auto-generating keys) -->
            <div class="section-container" id="publicKeySection" style="display: none;">
                <div class="section-flip-container">
                    <div class="section-front">
                        <h2>1 <span>share</span></h2>
                        <p style="margin-bottom: 20px; color: #999;">
                            Share this link with others so they can send you encrypted messages.
                        </p>
                        <button type="button" class="btn" id="copyPublicKeyBtn">
                            Copy Public Key Link
                        </button>
                    </div>
                </div>
            </div>

            <div id="generateResult"></div>

            <!-- Encrypt Message Section (shown when external public key is loaded or keys generated) -->
            <div class="section-container" id="encryptSection" style="display: none;">
                <div class="section-flip-container" id="encryptFlipContainer">
                    <div class="section-front">
                        <h2>1 <span>encrypt</span></h2>
                        <form id="encryptForm">
                            <div class="form-group">
                                <textarea id="plaintext" name="plaintext" required
                                        placeholder="Enter your message here" class="auto-resize" rows="5"></textarea>
                            </div>
                            <button type="button" class="btn" data-action="encrypt">
                                Encrypt Message
                                <span class="loading" style="display: none;"></span>
                            </button>
                        </form>
                    </div>
                    <div class="section-back">
                        <div class="message">
                            <strong>Message Encrypted Successfully!</strong><br>
                            Your encrypted message is ready to share
                        </div>
                        <div id="encryptResult" class="result">
                            <h3>Encrypted Message:</h3>
                            <div id="encryptedMessage"></div>
                            <button type="button" class="btn" id="copyEncrypted" style="margin-top: 10px; display: none;">
                                Copy Encrypted Message
                            </button>
                        </div>
                        <div id="flipBackButtonEncrypt"></div>
                    </div>
                </div>
            </div>

            <!-- Decrypt Message Section -->
            <div class="section-container" id="decryptSection" style="display: none;">
                <div class="section-flip-container" id="decryptFlipContainer">
                    <div class="section-front">
                        <h2>2 <span>decrypt</span></h2>
                        <form id="decryptForm">
                            <div class="form-group">
                                <textarea id="ciphertext" name="ciphertext" required
                                        placeholder="Paste the encrypted message here" class="auto-resize" rows="5"></textarea>
                            </div>
                            <button type="button" class="btn" data-action="decrypt">
                                Decrypt Message
                                <span class="loading" style="display: none;"></span>
                            </button>
                        </form>
                    </div>
                    <div class="section-back">
                        <div class="message">
                            Your decrypted message is ready.
                        </div>
                        <div id="decryptResult" class="result">
                            <h3>Decrypted Message:</h3>
                            <div id="decryptedMessage"></div>
                        </div>
                        <div id="flipBackButtonDecrypt"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
